services:
  ruckus-vsz-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ruckus-vsz-mcp-server
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      # Controller credentials (referenced in config.yaml)
      - VSZ_PROD_USERNAME=${VSZ_PROD_USERNAME:-}
      - VSZ_PROD_PASSWORD=${VSZ_PROD_PASSWORD:-}
      # Add more controller credentials as needed:
      # - VSZ_DR_USERNAME=${VSZ_DR_USERNAME:-}
      # - VSZ_DR_PASSWORD=${VSZ_DR_PASSWORD:-}
      # Security Settings
      - VSZ_API_KEY=${VSZ_API_KEY:-}
      - VSZ_ALLOWED_IPS=${VSZ_ALLOWED_IPS:-}
      # Server Settings
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount config.yaml for controller configuration
      - ../config.yaml:/app/config.yaml:ro
    networks:
      - ruckus-vsz-mcp-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8082/healthz'); exit(0 if r.ok else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ruckus-vsz-mcp-network:
    driver: bridge
